<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>供应商/股东制裁名单筛查</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;max-width:760px;margin:40px auto;} .err{color:#b00020}</style>
</head>
<body>
  <h2>供应商/股东制裁名单筛查</h2>
  <p>支持名单：OFAC SDN、联合国制裁、欧盟制裁、PPATK（可手工导入）。</p>
  {% if error %}<p class="err">{{ error }}</p>{% endif %}
  <form method="post" action="/run" enctype="multipart/form-data">
    <input type="file" name="file" accept=".xlsx,.xls" required />
    <button type="submit">开始查询</button>
  </form>
  <hr/>
  <p>输入文件要求：首列填写供应商或股东名称（每行一条）。</p>
</body>
</html>
